<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Étoiles Filantes</title>
<style>
body{
margin:0;
background:black;
overflow:hidden;
}
canvas{
display:block;
}
</style>
</head>

<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* étoiles fixes */
let stars = [];
for(let i=0;i<200;i++){
stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2});
}

/* étoiles filantes */
let shootingStars = [];

function createShootingStar(){
shootingStars.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height/2,
speed: 6+Math.random()*4,
len: 100+Math.random()*60
});
}
setInterval(createShootingStar,600);

/* texte en particules */
let particles = [];
const textCanvas = document.createElement("canvas");
const textCtx = textCanvas.getContext("2d");
textCanvas.width = canvas.width;
textCanvas.height = canvas.height;

textCtx.fillStyle = "white";
textCtx.font = "bold 50px Arial";
textCtx.textAlign = "center";
textCtx.fillText("FAIS DE BEAUX RÊVES", canvas.width/2, canvas.height/2);
textCtx.font = "bold 40px Arial";
textCtx.fillText("ET DÉSOLÉ", canvas.width/2, canvas.height/2+60);

let data = textCtx.getImageData(0,0,canvas.width,canvas.height).data;

for(let y=0;y<canvas.height;y+=6){
for(let x=0;x<canvas.width;x+=6){
let index=(y*canvas.width+x)*4;
if(data[index+3]>128){
particles.push({x:x, y:y, alpha:0});
}
}
}

/* animation */
let progress = 0;

function animate(){
ctx.fillStyle = "rgba(0,0,0,0.4)";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* étoiles fixes */
ctx.fillStyle="white";
for(let s of stars){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
}

/* étoiles filantes */
for(let i=0;i<shootingStars.length;i++){
let s = shootingStars[i];
ctx.strokeStyle="white";
ctx.lineWidth=2;
ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(s.x-s.len,s.y-s.len/2);
ctx.stroke();
s.x += s.speed;
s.y += s.speed/2;
if(s.x>canvas.width || s.y>canvas.height){
s.x = Math.random()*canvas.width/2;
s.y = Math.random()*canvas.height/3;
}
}

/* texte particules */
for(let i=0;i<progress && i<particles.length;i++){
let p = particles[i];
if(p.alpha < 1) p.alpha += 0.02;
ctx.fillStyle = "rgba(255,0,0,"+p.alpha+")";
ctx.fillRect(p.x,p.y,2,2);
}

progress += 5;

requestAnimationFrame(animate);
}

animate();

</script>
</body>
</html>
