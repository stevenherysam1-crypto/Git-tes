<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etoiles filantes</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

canvas{
display:block;
}
</style>

</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* étoiles filantes */

let shootingStars=[];

function createStar(){

shootingStars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height/2,
speed:6+Math.random()*6,
len:80+Math.random()*40
});

}

for(let i=0;i<8;i++){
createStar();
}

/* texte */

const text="FAIS DE BEAUX RÊVES\nET DÉSOLÉ";

function drawText(){

ctx.fillStyle="white";
ctx.textAlign="center";

ctx.font="bold 50px Arial";
ctx.fillText("FAIS DE BEAUX RÊVES",canvas.width/2,canvas.height/2);

ctx.font="bold 40px Arial";
ctx.fillText("ET DÉSOLÉ",canvas.width/2,canvas.height/2+60);

}

/* animation */

function animate(){

ctx.fillStyle="rgba(0,0,0,0.4)";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let s of shootingStars){

ctx.strokeStyle="white";
ctx.lineWidth=2;

ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(s.x-s.len,s.y-s.len/2);
ctx.stroke();

s.x+=s.speed;
s.y+=s.speed/2;

if(s.x>canvas.width || s.y>canvas.height){

s.x=Math.random()*canvas.width/2;
s.y=Math.random()*canvas.height/3;

}

}

drawText();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
