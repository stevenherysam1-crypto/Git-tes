<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Étoiles filantes et cœur</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family: Arial, sans-serif;
}
canvas{
  display:block;
}
#giftBtn{
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 20px;
  font-size: 16px;
  background-color: white;
  color: black;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<button id="giftBtn">Offrir un cadeau 🎁</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// petites étoiles autour
let stars = [];
for(let i=0;i<150;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.5,
    originalX:0,
    originalY:0
  });
}

// sauvegarder positions originales
for(let s of stars){
  s.originalX = s.x;
  s.originalY = s.y;
}

// étoiles filantes
let shootingStars = [];
function createShootingStar(){
  shootingStars.push({
    x: Math.random()*canvas.width,
    y: 0,
    speed: 6+Math.random()*4,
    len: 80+Math.random()*40
  });
}
setInterval(createShootingStar,600);

// texte en particules
let particles = [];
const textCanvas = document.createElement("canvas");
const textCtx = textCanvas.getContext("2d");
textCanvas.width = canvas.width;
textCanvas.height = canvas.height;
textCtx.fillStyle = "white";
textCtx.font = "bold 40px Arial";
textCtx.textAlign = "center";
textCtx.fillText("FAIS DE BEAUX RÊVES", canvas.width/2, canvas.height/2 - 30);
textCtx.fillText("SCINA", canvas.width/2, canvas.height/2 + 10);
textCtx.fillText("ET ENCORE DÉSOLÉ", canvas.width/2, canvas.height/2 + 50);

let data = textCtx.getImageData(0,0,canvas.width,canvas.height).data;
for(let y=0;y<canvas.height;y+=6){
  for(let x=0;x<canvas.width;x+=6){
    let index=(y*canvas.width+x)*4;
    if(data[index+3]>128){
      particles.push({x:x, y:y, alpha:0});
    }
  }
}

// générer points du cœur
let heartPoints = [];
const centerX = canvas.width/2;
const centerY = canvas.height/2 + 20;
const scale = 10;
for(let t=0; t<Math.PI; t+=0.03){
  const x = 16*Math.pow(Math.sin(t),3);
  const y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
  heartPoints.push({x:centerX + x*scale, y:centerY + y*scale});
}

let showHeart = false;

// clic sur bouton : étoiles autour se rapprochent pour former le cœur
document.getElementById("giftBtn").onclick = () => {
  showHeart = true;
  // attribuer chaque étoile fixe à une position du cœur (si assez)
  for(let i=0;i<stars.length && i<heartPoints.length;i++){
    stars[i].targetX = heartPoints[i].x;
    stars[i].targetY = heartPoints[i].y;
  }
};

let progress = 0;

function animate(){
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // étoiles fixes (ou en formation de cœur)
  ctx.fillStyle="white";
  for(let s of stars){
    if(showHeart && s.targetX != undefined){
      // déplacer doucement vers cible
      s.x += (s.targetX - s.x)*0.1;
      s.y += (s.targetY - s.y)*0.1;
    }
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  }

  // étoiles filantes
  for(let i=0;i<shootingStars.length;i++){
    let s = shootingStars[i];
    s.x += s.speed;
    s.y += s.speed/2;
    ctx.strokeStyle="white";
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(s.x,s.y);
    ctx.lineTo(s.x-s.len,s.y-s.len/2);
    ctx.stroke();

    if(s.x>canvas.width || s.y>canvas.height){
      s.x = Math.random()*canvas.width/2;
      s.y = 0;
    }
  }

  // texte particules blanc
  for(let i=0;i<progress && i<particles.length;i++){
    let p = particles[i];
    if(p.alpha < 1) p.alpha += 0.02;
    ctx.fillStyle = "rgba(255,255,255,"+p.alpha+")";
    ctx.fillRect(p.x,p.y,2,2);
  }
  progress += 3;

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
