<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Étoiles Filantes avec GIF</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family: Arial, sans-serif;
}
canvas{
  display:block;
}

/* bouton en bas */
#flowerBtn{
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 20px;
  font-size: 16px;
  background-color: white;
  color: black;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* GIF de fleur */
#flowerGif{
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  display: none; /* caché au départ */
  width: 150px; /* taille ajustable */
}
</style>
</head>

<body>
<canvas id="canvas"></canvas>
<button id="flowerBtn">Offrir une fleur 🌸</button>
<img id="flowerGif" src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif" alt="Fleur GIF">

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* étoiles fixes */
let stars = [];
for(let i=0;i<100;i++){
  stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*1.5});
}

/* étoile filante unique */
let shootingStar = null;
function createShootingStar(){
  shootingStar = {
    x: Math.random()*canvas.width/2,
    y: Math.random()*canvas.height/3,
    speed: 4 + Math.random()*2,
    len: 80 + Math.random()*40
  };
}
setInterval(createShootingStar,1200);

/* texte en particules */
let particles = [];
const textCanvas = document.createElement("canvas");
const textCtx = textCanvas.getContext("2d");
textCanvas.width = canvas.width;
textCanvas.height = canvas.height;

// texte blanc avec ligne supplémentaire
textCtx.fillStyle = "white";
textCtx.font = "bold 40px Arial";
textCtx.textAlign = "center";
textCtx.fillText("FAIS DE BEAUX RÊVES", canvas.width/2, canvas.height/2 - 30);
textCtx.fillText("SCINA", canvas.width/2, canvas.height/2 + 10);
textCtx.fillText("ET ENCORE DÉSOLÉ", canvas.width/2, canvas.height/2 + 50);

// récupérer pixels pour particules
let data = textCtx.getImageData(0,0,canvas.width,canvas.height).data;
for(let y=0;y<canvas.height;y+=6){
  for(let x=0;x<canvas.width;x+=6){
    let index=(y*canvas.width+x)*4;
    if(data[index+3]>128){
      particles.push({x:x, y:y, alpha:0});
    }
  }
}

/* animation texte et étoiles */
let progress = 0;

// bouton pour afficher le GIF
const flowerGif = document.getElementById("flowerGif");
document.getElementById("flowerBtn").onclick = () => {
  flowerGif.style.display = "block";
};

function animate(){
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // étoiles fixes
  ctx.fillStyle="white";
  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  }

  // étoile filante
  if(shootingStar){
    ctx.strokeStyle="white";
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(shootingStar.x,shootingStar.y);
    ctx.lineTo(shootingStar.x-shootingStar.len, shootingStar.y-shootingStar.len/2);
    ctx.stroke();
    shootingStar.x += shootingStar.speed;
    shootingStar.y += shootingStar.speed/2;
    if(shootingStar.x>canvas.width || shootingStar.y>canvas.height){
      shootingStar = null;
    }
  }

  // texte particules blanc
  for(let i=0;i<progress && i<particles.length;i++){
    let p = particles[i];
    if(p.alpha < 1) p.alpha += 0.02;
    ctx.fillStyle = "rgba(255,255,255,"+p.alpha+")";
    ctx.fillRect(p.x,p.y,2,2);
  }

  progress += 3;

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
