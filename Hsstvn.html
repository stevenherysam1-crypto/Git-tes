<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générique texte défilant</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  color:white;
  font-family: Arial, sans-serif;
}
canvas{
  display:block;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// texte à faire défiler
const lines = [
  "BONNE NUIT",
  "FAIS DE BEAUX RÊVES SCINA",
  "DÉSOLÉ DE TE DÉCEVOIR ENCORE"
];

// position de départ (en bas)
let y = canvas.height;

// vitesse de montée
const speed = 0.5;

// créer quelques étoiles fixes en arrière-plan
let stars = [];
for(let i=0;i<100;i++){
  stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2});
}

function animate(){
  // fond noir avec transparence légère pour effet léger
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // étoiles
  ctx.fillStyle = "white";
  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  }

  // texte
  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.font = "bold 36px Arial";

  for(let i=0;i<lines.length;i++){
    ctx.fillText(lines[i], canvas.width/2, y + i*50);
  }

  y -= speed; // le texte monte

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
