<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Étoiles et Cœur</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family: Arial, sans-serif;
}
canvas{
  display:block;
}

/* bouton en bas */
#giftBtn{
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 20px;
  font-size: 16px;
  background-color: white;
  color: black;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>
<canvas id="canvas"></canvas>
<button id="giftBtn">Offrir un cadeau 🎁</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* étoiles normales */
let stars = [];
for(let i=0;i<150;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.5,
    speed: 1 + Math.random()*2,
    target: null // pour cœur
  });
}

/* texte en particules */
let particles = [];
const textCanvas = document.createElement("canvas");
const textCtx = textCanvas.getContext("2d");
textCanvas.width = canvas.width;
textCanvas.height = canvas.height;

textCtx.fillStyle = "white";
textCtx.font = "bold 40px Arial";
textCtx.textAlign = "center";
textCtx.fillText("FAIS DE BEAUX RÊVES", canvas.width/2, canvas.height/2 - 30);
textCtx.fillText("SCINA", canvas.width/2, canvas.height/2 + 10);
textCtx.fillText("ET ENCORE DÉSOLÉ", canvas.width/2, canvas.height/2 + 50);

let data = textCtx.getImageData(0,0,canvas.width,canvas.height).data;
for(let y=0;y<canvas.height;y+=6){
  for(let x=0;x<canvas.width;x+=6){
    let index=(y*canvas.width+x)*4;
    if(data[index+3]>128){
      particles.push({x:x, y:y, alpha:0});
    }
  }
}

/* bouton pour activer le cœur */
let formingHeart = false;
document.getElementById("giftBtn").onclick = () => {
  formingHeart = true;
  // calculer positions des étoiles pour former le cœur
  const heartPoints = [];
  const centerX = canvas.width/2;
  const centerY = canvas.height/2 + 20;
  const scale = 15;
  for(let t=0;t<Math.PI;t+=0.05){
    const x = 16*Math.pow(Math.sin(t),3);
    const y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
    heartPoints.push({x:centerX + x*scale, y:centerY + y*scale});
  }
  for(let i=0;i<stars.length;i++){
    if(i<heartPoints.length){
      stars[i].target = heartPoints[i];
    }
  }
}

/* animation */
let progress = 0;

function animate(){
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // étoiles
  for(let s of stars){
    if(s.target && formingHeart){
      // déplacer doucement vers la cible
      s.x += (s.target.x - s.x)*0.05;
      s.y += (s.target.y - s.y)*0.05;
    }else{
      // mouvement normal
      s.x += (Math.random()-0.5)*s.speed;
      s.y += s.speed;
      if(s.y > canvas.height) s.y = 0;
      if(s.x > canvas.width) s.x = 0;
      if(s.x < 0) s.x = canvas.width;
    }
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  }

  // texte particules blanc
  for(let i=0;i<progress && i<particles.length;i++){
    let p = particles[i];
    if(p.alpha < 1) p.alpha += 0.02;
    ctx.fillStyle = "rgba(255,255,255,"+p.alpha+")";
    ctx.fillRect(p.x,p.y,2,2);
  }
  progress += 3;

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
